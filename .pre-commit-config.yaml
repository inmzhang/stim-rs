repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --all --check
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy --workspace --all-targets -- -D warnings
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false
      - id: cargo-test-workspace
        name: cargo test --workspace
        entry: cargo test --workspace
        language: system
        pass_filenames: false
      - id: cargo-test-doc
        name: cargo test --doc -p stim
        entry: cargo test --doc -p stim
        language: system
        pass_filenames: false
      - id: cargo-doc-stim
        name: cargo doc -p stim --no-deps with rustdoc warnings denied
        entry: env RUSTDOCFLAGS=-Dwarnings cargo doc -p stim --no-deps
        language: system
        pass_filenames: false
