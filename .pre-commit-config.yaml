repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --all --check
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy --workspace --all-targets -- -D warnings
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false
      - id: cargo-test-workspace
        name: cargo test --workspace
        entry: cargo test --workspace
        language: system
        pass_filenames: false
      - id: cargo-test-doc
        name: cargo test --doc -p stim
        entry: cargo test --doc -p stim
        language: system
        pass_filenames: false
      - id: python-verification
        name: python -m unittest tools.tests.test_stim_rust_parity_audit tools.tests.test_stim_api_inventory
        entry: python -m unittest tools.tests.test_stim_rust_parity_audit tools.tests.test_stim_api_inventory
        language: system
        pass_filenames: false
