name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-pr:
    if: github.repository_owner == 'inmzhang'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Open release PR
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  prebuilt-static-libs:
    if: github.repository_owner == 'inmzhang'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            simd_width: 128
            lib_path: build/stim/out/libstim.a
            asset: stim-cxx-libstim-x86_64-unknown-linux-gnu.a
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            simd_width: 64
            lib_path: build/stim/out/libstim.a
            asset: stim-cxx-libstim-aarch64-unknown-linux-gnu.a
          - os: macos-15
            target: aarch64-apple-darwin
            simd_width: 64
            lib_path: build/stim/out/libstim.a
            asset: stim-cxx-libstim-aarch64-apple-darwin.a
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            simd_width: 128
            lib_path: build/stim/out/Release/libstim.lib
            asset: stim-cxx-libstim-x86_64-pc-windows-msvc.lib
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build static Stim library
        shell: bash
        run: |
          cmake -S stim-cxx/vendor/stim -B build/stim -DCMAKE_BUILD_TYPE=Release -DSIMD_WIDTH=${{ matrix.simd_width }}
          cmake --build build/stim --config Release --target libstim --parallel
          mkdir -p dist
          cp "${{ matrix.lib_path }}" "dist/${{ matrix.asset }}"
          python -c "import hashlib,pathlib,sys; p=pathlib.Path(sys.argv[1]); print(hashlib.sha256(p.read_bytes()).hexdigest(), p.name)" "dist/${{ matrix.asset }}" > "dist/${{ matrix.asset }}.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/*

  release-plz-release:
    if: github.repository_owner == 'inmzhang'
    needs: [prebuilt-static-libs]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: crates-io
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
      - name: Prepare release assets
        run: |
          mkdir -p dist
          find release-assets -type f -name 'stim-cxx-libstim-*' ! -name '*.sha256' -exec cp {} dist/ \;
          find release-assets -type f -name '*.sha256' -exec cat {} \; | sort -k2 > stim-cxx/prebuilt-sha256.txt
          cp stim-cxx/prebuilt-sha256.txt dist/stim-cxx-prebuilt-sha256.txt
      - name: Smoke test Linux prebuilt asset
        env:
          STIM_RS_PREBUILT_DIR: ${{ github.workspace }}/dist
        run: cargo test -p stim-cxx --test linux_smoke
      - name: Publish crates and tag release
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Upload prebuilt assets
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "stim") | .version')" dist/* --clobber
