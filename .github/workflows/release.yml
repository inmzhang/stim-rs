name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Workspace tests
        run: cargo test --workspace
      - name: Doc tests
        run: cargo test --doc -p stim
      - name: Python verification
        run: python -m unittest tools.tests.test_stim_rust_parity_audit tools.tests.test_stim_api_inventory
      - name: Verify stim-cxx package layout
        run: cargo package -p stim-cxx --allow-dirty --locked
      - name: Verify stim package layout
        run: cargo package -p stim --allow-dirty --locked --no-verify --list > /tmp/stim-package-list.txt

  publish:
    if: github.event_name == 'push'
    needs: release-verification
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p stim-cxx -p stim --allow-dirty --locked
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
